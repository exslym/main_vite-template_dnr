    <script type="text/javascript">
      (function (e) {
        const matches =
          e.matches ||
          e.matchesSelector ||
          e.webkitMatchesSelector ||
          e.mozMatchesSelector ||
          e.msMatchesSelector ||
          e.oMatchesSelector;
        !matches
          ? (e.matches = e.matchesSelector =
              function matches(selector) {
                const matches = document.querySelectorAll(selector);

                });

          : (e.matches = e.matchesSelector = matches);
      })(Element.prototype);
      (function (e) {
        e.closest =
          e.closest ||
          function (css) {
            const node = this;
            while (node) {
              if (node.matches(css)) return node;
              else node = node.parentElement;
            }

          };
      })(Element.prototype);
      const videos = document.querySelectorAll('video');
      videos.forEach((video) => {
        let timer = null;
        let sec = 0;
        const startTimer = function startTimer() {
          return setInterval(() => {
            const seconds = sec + 1;
            const minutes = Math.floor(seconds / 60);
            const durationReal = Math.floor(video.duration);
            // Конец видео (продолжительность видео минус 5 секунд, можно задать точнее, например, за 1 секунду до конца)
            const duration = durationReal - 5;
            const data = video.dataset.label;

            // Старт видео (с 1 секунды):
            switch (true) {
              case seconds === 1:
                ga(`${projectName}.send`, `event`, `video`, `start`, data);
                gtag(`event`, `video`, { video: `${data} - start` });
                break;
              case seconds > 0 && seconds < 30:
                if (seconds % 5 === 0) {
                  ga(`${projectName}.send`, `event`, `video`, `${seconds}s`, data);
                  gtag(`event`, `video`, { video: `${data} - ${seconds}s` });
                }
                break;
              case seconds >= 30 && seconds < 60:
                if (seconds % 15 === 0) {
                  ga(`${projectName}.send`, `event`, `video`, `${seconds}s`, data);
                  gtag(`event`, `video`, { video: `${data} - ${seconds}s` });
                }
                break;
              // после первых 60 секунд конвертим секунды в минуты и каждые 15 секунд опрокидываем событие вида, например, 1m 45s, далее 2m, далее 2m 15s и т.д.:
              case seconds >= 60 && seconds < duration:
                if (seconds % 15 === 0) {
                  switch (true) {
                    case seconds - minutes * 60 !== 0:
                      ga(
                        `${projectName}.send`,
                        `event`,
                        `video`,
                        `${minutes}m ${seconds - minutes * 60}s`,
                        data,
                      );
                      gtag(`event`, `video`, {
                        video: `${data} - ${minutes}m ${seconds - minutes * 60}s`,
                      });
                      break;
                    default:
                      ga(`${projectName}.send`, `event`, `video`, `${minutes}m`, data);
                      gtag(`event`, `video`, {
                        video: `${data} - ${minutes}m`,
                      });
                  }
                }
                break;
              // Конец видео:
              case seconds === duration:
                ga(`${projectName}.send`, `event`, `video`, `end`, data);
                gtag(`event`, `video`, { video: `${data} - end` });
                break;
            }
            sec++;
          }, 1000);
        };
        const stopTimer = () => {
          clearInterval(timer);
        };
        video.addEventListener('play', () => {
          timer = startTimer();
        });
        video.addEventListener('pause', () => {
          stopTimer();
        });
